<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Like Your Car</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0C0D10;--surface:#16181D;--ink:#F1F2F5;--muted:#A2A6B0;--line:#2A2D34;--accent:#9421FF;--accent-ink:#A855FF;--radius:16px;--container:640px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .container{max-width:var(--container);margin:0 auto;padding:0 24px}
  header{border-bottom:1px solid var(--line);background:var(--surface)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:70px;max-width:1120px;margin:0 auto;padding:0 24px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .logo{height:36px;width:auto;display:block}
  main{padding:64px 0 80px}
  .eyebrow{font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  h1{font-family:'Fraunces';font-weight:500;font-size:clamp(30px,5vw,44px);margin:12px 0 10px}
  .lead{color:var(--muted);font-size:18px;margin-bottom:36px}
  form{display:flex;flex-direction:column;gap:18px}
  label{display:block;font-size:14px;font-weight:600;margin-bottom:7px}
  input,textarea{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--ink);font-family:'Inter';font-size:15px}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:150px;resize:vertical}
  button{align-self:flex-start;background:var(--accent);color:#fff;font-weight:600;font-size:15px;padding:14px 28px;border:0;border-radius:999px;cursor:pointer;transition:.18s ease;font-family:'Inter'}
  button:hover{background:var(--accent-ink);transform:translateY(-1px)}
  button:disabled{opacity:.6;cursor:default;transform:none}
  .status{font-size:15px;padding:14px 16px;border-radius:12px;display:none}
  .status.ok{display:block;background:rgba(52,199,89,.12);border:1px solid rgba(52,199,89,.4);color:#8fe3a2}
  .status.err{display:block;background:rgba(255,69,58,.12);border:1px solid rgba(255,69,58,.4);color:#ff9a92}
  footer{border-top:1px solid var(--line);padding:30px 0;color:var(--muted);font-size:13.5px;text-align:center}
</style>
</head>
<body>
<header>
  <div class="nav">
    <a class="brand" href="index.html"><img class="logo" src="assets/logo.png" alt="Like Your Car"></a>
    <a href="index.html">← Back to site</a>
  </div>
</header>
<main>
  <div class="container">
    <span class="eyebrow">Contact</span>
    <h1>Get in touch</h1>
    <p class="lead">Questions before you book, or just want to say hi? Send a note and we'll get back to you.</p>
    <form id="contactForm" action="https://formspree.io/f/xvzjvaoq" method="POST">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <input type="hidden" name="_subject" value="New Like Your Car contact message">
      <button type="submit">Send message</button>
      <p class="status" id="status" role="status" aria-live="polite"></p>
    </form>
  </div>
</main>
<footer>© 2026 Like Your Car. All rights reserved. · <a href="index.html" style="color:inherit;text-decoration:underline">Home</a></footer>
<script>
(function(){
  var f=document.getElementById('contactForm'),s=document.getElementById('status'),b=f.querySelector('button');
  f.addEventListener('submit',function(ev){
    ev.preventDefault();
    if(f.action.indexOf('YOUR_FORM_ID')>-1){s.className='status err';s.textContent='This form is not connected yet — the Formspree endpoint still needs to be added.';return;}
    b.disabled=true;b.textContent='Sending…';
    fetch(f.action,{method:'POST',body:new FormData(f),headers:{'Accept':'application/json'}})
      .then(function(r){
        if(r.ok){f.reset();s.className='status ok';s.textContent="Thanks! Your message is on its way — we'll be in touch soon.";}
        else{s.className='status err';s.textContent='Something went wrong. Please email hello@likeyourcar.com directly.';}
      })
      .catch(function(){s.className='status err';s.textContent='Something went wrong. Please email hello@likeyourcar.com directly.';})
      .finally(function(){b.disabled=false;b.textContent='Send message';});
  });
})();
</script>
</body>
</html>
